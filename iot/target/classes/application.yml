server:
  port: 8081

spring:
  application:
    name: shaft-temp-iot
  datasource:
    url: jdbc:mysql://localhost:3306/shaft?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
  data:
    redis:
      repositories:
        enabled: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

shaft:
  mq:
    enabled: false
    broker-url: tcp://localhost:1883
    client-id: shaft-temp-iot-consumer
    topics:
      - /TMP/+/Measure
      - /TMP/+/Alarm
  iot:
    service-base-url: http://127.0.0.1:8080
