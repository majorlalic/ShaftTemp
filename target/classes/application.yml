
server:
  port: 8080
spring:
  application:
    name: shaft-temp
  rabbitmq:
    host: localhost
    port: 5672
    listener:
      simple:
        acknowledge-mode: auto
  datasource:
    url: jdbc:mysql://localhost:3306/shaft?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      repositories:
        enabled: false
  redis:
    host: localhost
    port: 6379
  task:
    scheduling:
      pool:
        size: 2
logging:
  level:
    com.example.demo: INFO
shaft:
  mq:
    enabled: false
    queue: shaft.temp.report
  alarm:
    temperature-threshold: 70.0
    temperature-diff-threshold: 20.0
    rise-rate-threshold: 10.0
    fiber-break-threshold: 0.0
    offline-threshold-seconds: 30
    window-size: 20
    event-throttle-seconds: 300
  cache:
    partition-binding-refresh-ms: 300000
  stat:
    flush-delay-ms: 15000
  inspection:
    enabled: true
    fixed-delay-ms: 30000
